<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6; 
            margin: 0;
            padding: 0;
        }
        .card-container { width: 500px; height: 315px; position: relative; }
        
        /* Container Utama Kartu */
        #membership-card {
            width: 1011px; height: 638px;
            background-color: #1a1a1a; position: absolute;
            top: 0; left: 0;
            overflow: hidden; 
            transform-origin: top left;
            border-radius: 40px;
        }

        /* Background Foto Toko */
        #store-bg {
            position: absolute;
            top: 0; right: 0; width: 75%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Overlay Gradasi */
        .gradient-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, #1a1a1a 0%, #1a1a1a 30%, rgba(26, 26, 26, 0.7) 55%, rgba(26, 26, 26, 0) 100%);
            z-index: 2;
        }

        .preview-scale { transform: scale(0.494); }
        #card-name { line-height: 1.1; font-weight: 900; color: white; }
        .tab-active { border-bottom: 2px solid #000; color: #000; }
        
        .content-layer { position: relative; z-index: 10; height: 100%; pointer-events: none; }
        
        .accent-line {
            width: 8px;
            height: 100%;
            background: #00E5FF;
            position: absolute;
            left: 0; top: 0;
            z-index: 20;
        }
    </style>
    <!-- Library harus dimuat dengan benar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.1/html-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 gap-6">

    <!-- Area Preview -->
    <div class="card-container rounded-3xl shadow-2xl no-print border border-gray-300 bg-black">
        <div id="membership-card" class="preview-scale">
            <div class="accent-line"></div>
            
            <!-- Background Layer -->
            <div id="store-bg" style="background-image: url('public/background.jpeg');"></div>
            <div class="gradient-overlay"></div>
            
            <div class="content-layer p-16 flex flex-col">
                <!-- Header -->
                <div class="flex justify-between items-start">
                    <div class="space-y-3">
                        <div class="flex items-center gap-4">
                            <div class="w-24 h-24 bg-white rounded-xl p-1 shadow-inner">
                                <img src="public/logo-abc.png" alt="Logo" class="w-full h-full">
                            </div>
                            <h2 class="text-4xl font-black text-white tracking-tighter uppercase">ABC JAYA</h2>
                        </div>
                        <p class="text-[1.3rem] font-bold text-[#00E5FF] tracking-[0.5em] uppercase pl-1">Frozen Food </p>
                    </div>
                    <div class="bg-[#FF007F] text-white px-8 py-2 rounded-2xl font-black italic text-xl shadow-xl uppercase tracking-widest">Member</div>
                </div>

                <!-- Info Member -->
                <div class="max-w-[60%] mt-[9rem]">
                    <p class="text-[16px] font-bold text-white uppercase tracking-[.6em] mb-4">Exclusive Customer</p>
                    <h1 id="card-name" class="text-7xl font-black uppercase break-words leading-none">M HASBI</h1>
                    
                    <div class="mt-10 space-y-5">
                        <div class="flex items-center gap-5 text-white">
                            <div class="w-10 h-10 rounded-full bg-[#25D366] flex items-center justify-center shadow-lg">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                            </div>
                            <span id="card-phone" class="text-3xl font-bold tracking-tight text-white">+62 812 3456 7890</span>
                        </div>
                        <div class="flex items-center gap-5 text-white">
                            <div class="w-10 h-10 flex items-center justify-center">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path></svg>
                            </div>
                            <span id="card-address" class="text-2xl font-bold leading-tight">Panjalu, Ciamis</span>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="flex justify-between items-end hidden">
                    <div class="text-white/40 text-[11px] font-bold tracking-[0.4em] uppercase">
                        EST. 2024 • VALID THRU 2026<br>
                        OFFICIAL ABC JAYA MEMBER CARD
                    </div>
                    <div class="bg-white p-3 rounded-2xl shadow-2xl">
                        <div id="qrcode"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let qrcodeInstance = null;

        function initQR() {
            const qrContainer = document.getElementById("qrcode");
            if (!qrContainer) return;
            
            qrContainer.innerHTML = '';
            // Gunakan global QRCode yang dimuat dari library
            try {
                qrcodeInstance = new QRCode(qrContainer, {
                    text: "https://wa.me/6281234567890",
                    width: 110,
                    height: 110,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } catch (e) {
                console.error("QRCode library belum siap", e);
            }
        }

        function switchTab(type) {
            document.getElementById('panel-single').classList.toggle('hidden', type !== 'single');
            document.getElementById('panel-bulk').classList.toggle('hidden', type !== 'bulk');
            document.getElementById('tab-single').classList.toggle('tab-active', type === 'single');
            document.getElementById('tab-bulk').classList.toggle('tab-active', type === 'bulk');
        }

        function updateCard() {
            const n = document.getElementById('input-name').value || "NAMA MEMBER";
            const p = document.getElementById('input-phone').value || "628xxx";
            const a = document.getElementById('input-address').value || "Alamat";
            const bg = document.getElementById('input-bg').value;

            document.getElementById('card-name').innerText = n.toUpperCase();
            document.getElementById('card-phone').innerText = p;
            document.getElementById('card-address').innerText = a;
            
            if(bg && bg.trim() !== "") {
                document.getElementById('store-bg').style.backgroundImage = `url('${bg}')`;
            }

            if (qrcodeInstance) {
                const cleanPhone = p.replace(/[^0-9]/g, '');
                qrcodeInstance.makeCode(`https://wa.me/${cleanPhone}`);
            }
        }

        async function captureCard() {
            const node = document.getElementById('membership-card');
            return await htmlToImage.toPng(node, { 
                pixelRatio: 2,
                cacheBust: true,
                filter: (n) => (n.tagName !== 'LINK' || n.rel !== 'stylesheet')
            });
        }

        async function exportSinglePNG() {
            const cardElement = document.getElementById('membership-card');
            cardElement.classList.remove('preview-scale');
            try {
                const dataUrl = await captureCard();
                const link = document.createElement('a');
                link.download = `Member-${document.getElementById('input-name').value || 'New'}.png`;
                link.href = dataUrl;
                link.click();
            } catch (err) {
                console.error("Export gagal", err);
            } finally {
                cardElement.classList.add('preview-scale');
            }
        }

        async function exportBulkZip() {
            const rawData = document.getElementById('bulk-data').value.trim();
            if (!rawData) return;
            
            const lines = rawData.split('\n');
            const zip = new JSZip();
            const cardElement = document.getElementById('membership-card');
            
            cardElement.classList.remove('preview-scale');

            for (let i = 0; i < lines.length; i++) {
                const parts = lines[i].split(',').map(s => s.trim());
                if (parts.length < 1) continue;

                document.getElementById('input-name').value = parts[0] || "";
                document.getElementById('input-phone').value = parts[1] || "";
                document.getElementById('input-address').value = parts[2] || "";
                
                updateCard();
                // Tunggu sebentar agar DOM & QR update
                await new Promise(r => setTimeout(r, 300)); 

                const dataUrl = await captureCard();
                zip.file(`${i+1}-${parts[0]}.png`, dataUrl.split(',')[1], {base64: true});
            }

            const content = await zip.generateAsync({type: "blob"});
            saveAs(content, "Bulk-Member-ABC.zip");
            cardElement.classList.add('preview-scale');
            updateCard(); // reset ke input manual terakhir
        }

        // Pastikan inisialisasi saat semua siap
        window.addEventListener('load', () => {
            initQR();
            updateCard();
        });
    </script>
</body>
</html>
